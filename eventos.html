<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stream • Golazo Cubano</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --cu-red:    #c8102e;
      --cu-blue:   #002a8f;
      --cu-white:  #f5f0e8;
      --cu-gold:   #f5c518;
      --cu-dark:   #0a0608;
      --cu-mid:    #160d10;
      --cu-glow:   rgba(200,16,46,0.3);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body, html {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--cu-dark);
      font-family: 'Oswald', sans-serif;
    }

    /* ── FULL-SCREEN PLAYER WRAPPER ── */
    #player-wrap {
      position: fixed;
      inset: 0;
      z-index: 10;
    }

    iframe#stream-frame {
      width: 100%; height: 100%;
      border: none;
      display: block;
    }

    /* ── ERROR SCREEN ── */
    #error-screen {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 20;
      background:
        radial-gradient(ellipse at 50% 0%, rgba(200,16,46,0.35) 0%, transparent 60%),
        radial-gradient(ellipse at 50% 100%, rgba(0,42,143,0.35) 0%, transparent 60%),
        var(--cu-dark);
      overflow: hidden;
    }

    /* Cuban star / stripe decorations */
    .cu-stripe {
      position: absolute;
      left: 0; right: 0;
      height: 6px;
    }
    .cu-stripe-top    { top: 0;    background: linear-gradient(90deg, var(--cu-blue), var(--cu-red), var(--cu-blue)); }
    .cu-stripe-bottom { bottom: 0; background: linear-gradient(90deg, var(--cu-red), var(--cu-blue), var(--cu-red)); }

    /* diagonal flag-stripe overlay (subtle) */
    .cu-flag-bg {
      position: absolute;
      inset: 0;
      background:
        repeating-linear-gradient(
          -55deg,
          transparent 0px,
          transparent 60px,
          rgba(200,16,46,0.04) 60px,
          rgba(200,16,46,0.04) 62px
        );
      pointer-events: none;
    }

    .error-inner {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 20px;
      padding: 40px 20px;
    }

    /* ── STAR ICON ── */
    .star-wrapper {
      position: relative;
      width: 100px; height: 100px;
      display: flex; align-items: center; justify-content: center;
    }

    .star-ring {
      position: absolute;
      width: 100px; height: 100px;
      border: 2px solid var(--cu-red);
      border-radius: 50%;
      animation: ring-pulse 2.5s ease-in-out infinite;
    }

    @keyframes ring-pulse {
      0%,100% { transform: scale(1);   opacity: 0.6; }
      50%      { transform: scale(1.15); opacity: 1;   }
    }

    .star-svg {
      width: 60px; height: 60px;
      filter: drop-shadow(0 0 14px var(--cu-red));
      animation: star-spin 12s linear infinite;
    }

    @keyframes star-spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    /* ── TITLES ── */
    .error-title {
      font-family: 'Bebas Neue', cursive;
      font-size: clamp(28px, 6vw, 52px);
      letter-spacing: 5px;
      color: var(--cu-white);
      text-shadow:
        0 0 20px var(--cu-red),
        0 0 40px rgba(200,16,46,0.4);
      text-align: center;
      line-height: 1;
    }

    .error-sub {
      font-family: 'Share Tech Mono', monospace;
      font-size: clamp(11px, 2.5vw, 14px);
      color: rgba(245,240,232,0.55);
      letter-spacing: 3px;
      text-align: center;
      max-width: 360px;
    }

    /* ── DIVIDER ── */
    .cu-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      max-width: 380px;
    }

    .cu-divider::before,
    .cu-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--cu-red), transparent);
    }

    .cu-divider-star {
      color: var(--cu-gold);
      font-size: 14px;
    }

    /* ── BACK BUTTON ── */
    .btn-back {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 12px 32px;
      background: transparent;
      border: 2px solid var(--cu-red);
      border-radius: 4px;
      color: var(--cu-white);
      font-family: 'Bebas Neue', cursive;
      font-size: 18px;
      letter-spacing: 3px;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.25s;
      position: relative;
      overflow: hidden;
    }

    .btn-back::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, var(--cu-red), #8b0000);
      opacity: 0;
      transition: opacity 0.25s;
    }

    .btn-back:hover { box-shadow: 0 0 24px var(--cu-glow); }
    .btn-back:hover::before { opacity: 1; }
    .btn-back span { position: relative; z-index: 1; }

    /* ── FOOTER HAIKU ── */
    .cu-footer {
      position: absolute;
      bottom: 28px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      color: rgba(245,240,232,0.2);
      letter-spacing: 2px;
      text-align: center;
    }

    /* ── LOADING OVERLAY ── */
    #loading-overlay {
      position: fixed;
      inset: 0;
      z-index: 30;
      background:
        radial-gradient(ellipse at 30% 50%, rgba(200,16,46,0.25) 0%, transparent 55%),
        radial-gradient(ellipse at 70% 50%, rgba(0,42,143,0.25) 0%, transparent 55%),
        var(--cu-dark);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
    }

    .cu-spinner {
      width: 64px; height: 64px;
      border: 3px solid rgba(200,16,46,0.2);
      border-top: 3px solid var(--cu-red);
      border-right: 3px solid var(--cu-blue);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .load-title {
      font-family: 'Bebas Neue', cursive;
      font-size: 26px;
      letter-spacing: 5px;
      color: var(--cu-white);
      text-shadow: 0 0 14px var(--cu-red);
      animation: blink 1.8s ease-in-out infinite;
    }

    @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0.4; } }

    .load-sub {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      letter-spacing: 3px;
      color: rgba(245,240,232,0.4);
    }
  </style>
</head>
<body>

  <!-- Loading overlay -->
  <div id="loading-overlay">
    <div class="cu-spinner"></div>
    <div class="load-title">CONECTANDO STREAM</div>
    <div class="load-sub">UN MOMENTO, COMPAY...</div>
  </div>

  <!-- Player (hidden until redirect/embed) -->
  <div id="player-wrap" style="display:none;">
    <iframe id="stream-frame" allowfullscreen allow="autoplay; fullscreen"></iframe>
  </div>

  <!-- Error screen -->
  <div id="error-screen">
    <div class="cu-stripe cu-stripe-top"></div>
    <div class="cu-stripe cu-stripe-bottom"></div>
    <div class="cu-flag-bg"></div>

    <div class="error-inner">
      <div class="star-wrapper">
        <div class="star-ring"></div>
        <svg class="star-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <polygon
            points="50,5 61,35 95,35 68,57 79,91 50,70 21,91 32,57 5,35 39,35"
            fill="var(--cu-red)" />
        </svg>
      </div>

      <div class="error-title">SEÑAL NO DISPONIBLE</div>
      <div class="error-sub">EL STREAM NO PUDO CARGARSE.<br>VUELVE A INTENTARLO MÁS TARDE, SOCIO.</div>

      <div class="cu-divider">
        <span class="cu-divider-star">★</span>
      </div>

      <a class="btn-back" onclick="history.back()">
        <span>← VOLVER A LA AGENDA</span>
      </a>

      <div class="cu-footer">FUTBOL EN VIVO • FÚTBOL PA' LA GENTE</div>
    </div>
  </div>

<script>
  (function () {
    const params  = new URLSearchParams(window.location.search);
    const r       = params.get('r');
    const loading = document.getElementById('loading-overlay');
    const player  = document.getElementById('player-wrap');
    const frame   = document.getElementById('stream-frame');
    const errScr  = document.getElementById('error-screen');

    function showError() {
      loading.style.display = 'none';
      player.style.display  = 'none';
      errScr.style.display  = 'block';
    }

    function loadUrl(url) {
      // Small delay so loading screen shows
      setTimeout(() => {
        loading.style.display = 'none';
        player.style.display  = 'block';
        frame.src = url;
      }, 900);
    }

    if (!r) { showError(); return; }

    try {
      const decoded = atob(decodeURIComponent(r));

      if (!decoded.startsWith('http')) throw new Error('invalid url');

      // If it's an iframe-able source (m3u8 / known players)
      // we embed; otherwise we redirect to avoid CORS issues
      const iframeHosts = ['youtube.com', 'youtu.be', 'twitch.tv', 'dailymotion.com',
                           'ok.ru', 'vk.com', 'streamtp', 'embedstream', 'golazoplay',
                           'pltvhd', 'goolhd', 'fubolazo'];

      const shouldEmbed = iframeHosts.some(h => decoded.includes(h));

      if (shouldEmbed) {
        loadUrl(decoded);
      } else {
        // redirect approach — works for direct stream pages
        loading.style.display = 'flex';
        setTimeout(() => { window.location.href = decoded; }, 800);
      }
    } catch (e) {
      showError();
    }
  })();
</script>

</body>
</html>
